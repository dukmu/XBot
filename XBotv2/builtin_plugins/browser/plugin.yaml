name: browser
version: "1.0.0"
description: Live web search, content retrieval, and browser interaction
api_version: "1"
config_schema:
  type: object
  additionalProperties: false
  properties:
    search:
      type: object
      additionalProperties: false
      properties:
        backend:
          type: string
          default: auto
        region:
          type: string
          default: wt-wt
        safesearch:
          type: string
          enum: [on, moderate, off]
          default: moderate
    network:
      type: object
      additionalProperties: false
      properties:
        timeout_seconds:
          type: number
          exclusiveMinimum: 0
          default: 20
        max_response_bytes:
          type: integer
          minimum: 1
          default: 5000000
        allow_private:
          type: boolean
          default: false
    browser:
      type: object
      additionalProperties: false
      properties:
        headless:
          type: boolean
          default: true
        timeout_seconds:
          type: number
          exclusiveMinimum: 0
          default: 30
