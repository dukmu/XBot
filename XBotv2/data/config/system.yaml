agent_name: XBotv2
agent_role: General-purpose agent runtime
provider: default
max_context_tokens: 32000
tool_result_max_inline_chars: 12000
tool_result_preview_chars: 4000
tools:
  - shell
  - list_tasks
  - stop_task
  - filesystem_read
  - filesystem_stat
  - filesystem_list
  - filesystem_write
  - filesystem_edit
  - filesystem_patch
  - filesystem_move
  - filesystem_copy
  - filesystem_delete
  - filesystem_mkdir
  - search_text
  - find_files
  - send_message
  - ask_user
  - request_permission
  - plugin:compact:*
  - plugin:agents:*
  - plugin:todolist:*
  - plugin:goal:*
  - plugin:skills:*
  - skills:*:*
  - mcp:*:*
plugins: {}
hooks: []
