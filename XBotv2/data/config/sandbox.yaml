# Sandbox configuration — all file I/O and shell commands run inside bubblewrap.
#
# enabled:  enable sandbox (default true). Tools use sandbox capabilities when enabled.
# network:  allow network access inside sandbox (default true). When false, --unshare-net.
# external_read:   default access for paths outside workspace (ask/deny/allow/readonly)
# external_write:  default access for writing outside workspace
# workspace_read:  default access for reading inside workspace
# workspace_write: default access for writing inside workspace
# resources:       explicit per-path rules [{path, access}]; paths may use
#                  built-in variables such as ${workspace} or ${tool_results}

enabled: true
network: true

external_read: ask
external_write: ask
workspace_read: allow
workspace_write: allow

resources: []
