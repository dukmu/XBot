# XBotv2 Provider Configuration
# Supported providers: openai, anthropic, deepseek, lmstudio

default:
  provider: deepseek
  model: deepseek-chat
  base_url: https://api.deepseek.com/v1
  api_key: ${DEEPSEEK_API_KEY}
  temperature: 0.7
  max_tokens: 8192

# DeepSeek provider (OpenAI-compatible protocol)
deepseek:
  provider: deepseek
  model: deepseek-chat
  base_url: https://api.deepseek.com/v1
  api_key: ${DEEPSEEK_API_KEY}
  temperature: 0.7
  max_tokens: 8192

# LM Studio with Qwen (Anthropic-compatible protocol)
lmstudio:
  provider: anthropic
  model: qwen2.5-coder-7b-instruct
  base_url: http://localhost:1234/v1
  api_key: lm-studio
  temperature: 0.7
  max_tokens: 4096

# OpenAI (for reference)
openai:
  provider: openai
  model: gpt-4o
  base_url: https://api.openai.com/v1
  api_key: ${OPENAI_API_KEY}
  temperature: 0.7
  max_tokens: 4096

# Anthropic (for reference)
anthropic:
  provider: anthropic
  model: claude-sonnet-4-20250514
  api_key: ${ANTHROPIC_API_KEY}
  temperature: 0.7
  max_tokens: 4096
