allow:
- tool: list_tasks
- tool: stop_task
- tool: (?:send_message|ask_user)
- tool: (?:search_text|find_files)
- tool: (?:list_todos|create_todo|update_todo|remove_todo)
- tool: (?:filesystem_read|filesystem_list)
- tool: shell
ask:
- tool: filesystem_write
deny:
- tool: .*
  params:
    command: rm -rf /.*
