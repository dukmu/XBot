default: deepseek

providers:
  deepseek:
    provider: openai
    model: deepseek-v4-flash
    base_url: https://api.deepseek.com/v1
    api_key_env: DEEPSEEK_API_KEY
    temperature: 0.7
    max_tokens: 8192
    reasoning_effort: high        # or max
    thinking_enabled: true

  minimax:
    provider: anthropic
    model: Minimax-M3
    base_url: https://api.minimaxi.com/anthropic
    api_key_env: MINIMAX_API_TOKEN
    temperature: 0.2
    max_tokens: 32768
    reasoning_effort: high        # or max
    thinking_enabled: true

  lmstudio:
    provider: openai
    model: qwen/qwen3-1.7b
    base_url: http://localhost:1234/v1
    api_key: lm-studio
    temperature: 0.2
    max_tokens: 32768
    reasoning_effort: high        # or max
    thinking_enabled: true

  lmstudio_pc:
    provider: anthropic
    model: qwen/qwen3.5-9b
    base_url: http://10.106.21.164:1234/
    api_key: lm-studio
    temperature: 0.2
    max_tokens: 128000
    reasoning_effort: high        # or max
    thinking_enabled: true

  openai:
    provider: openai
    model: gpt-4o
    base_url: https://api.openai.com/v1
    api_key_env: OPENAI_API_KEY
    temperature: 0.7
    max_tokens: 4096

  anthropic:
    provider: anthropic
    model: claude-sonnet-4-20250514
    api_key_env: ANTHROPIC_API_KEY
    temperature: 0.7
    max_tokens: 4096
